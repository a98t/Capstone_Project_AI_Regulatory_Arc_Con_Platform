version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:v1.9.7
    container_name: derek_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./data/qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__TELEMETRY_DISABLED=true
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6333/readyz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: Langfuse self-hosted (use cloud free tier instead to save setup time)
  # langfuse:
  #   image: langfuse/langfuse:2
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     - DATABASE_URL=postgresql://langfuse:langfuse@langfuse_db:5432/langfuse
  #     - NEXTAUTH_SECRET=supersecret
  #     - NEXTAUTH_URL=http://localhost:3000
  #   depends_on:
  #     - langfuse_db

networks:
  default:
    name: derek_network
